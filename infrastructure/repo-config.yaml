# Non-secret repo policy consumed by CI via reusable-load-repo-config.yml@v1
# (A-779) — see CLAUDE.md.
#
# This is a versioned, non-npm deploy target: it publishes no npm or GitHub
# package, so there are no registry / scope keys here (A-941). Release tags +
# GitHub Releases are cut by the release-orchestrator (release-please); the
# in-repo workflows are CI (ci.yml) and post-merge changelog enrichment
# (changelog-enrich.yml).
#
# NOTE: Workflow triggers (on.push.branches) cannot reference this file at
# runtime; keep defaultBranch in sync with the branches listed in the workflow
# `on:` triggers (ci.yml, changelog-enrich.yml).

defaultBranch: main
nodeVersionFile: .nvmrc
